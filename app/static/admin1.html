<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - إدارة المستخدمين</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        /* تنسيق الجدول */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: right; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        /* الأزرار */
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-edit { background-color: #ffc107; color: #212529; margin-left: 5px; }
        .btn-delete { background-color: #dc3545; color: white; }
        .btn-add { background-color: #28a745; color: white; float: left; padding: 10px 15px; }
        
        /* النوافذ المنبثقة (Modals) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-add" onclick="openAddModal()">➕ إضافة مستخدم جديد</button>
    <h1>👥 إدارة مستخدمي النظام</h1>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>الإسم الكامل</th>
                <th>البريد الإلكتروني</th>
                <th>التحكم والإجراءات</th>
            </tr>
        </thead>
        <tbody id="usersTableBody">
            <!-- يتم تعبئة السطور هنا برمجياً -->
        </tbody>
    </table>
</div>

<!-- نافذة إضافة / تعديل مستخدم -->
<div class="modal" id="userModal">
    <div class="modal-content">
        <h3 id="modalTitle">إضافة مستخدم جديد</h3>
        <input type="hidden" id="currentUserId">
        
        <div class="form-group">
            <label>الإسم الكامل:</label>
            <input type="text" id="fullNameInput">
        </div>
        <div class="form-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" id="emailInput">
        </div>
        <div class="form-group">
            <label id="passLabel">كلمة المرور:</label>
            <input type="password" id="passwordInput">
        </div>
        
        <div class="modal-actions">
            <button class="btn-delete" onclick="closeModal()">إلغاء</button>
            <button class="btn-add" style="background:#007bff;" id="saveBtn" onclick="saveUser()">حفظ البيانات</button>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = "10.234.222.164:8000";
    const token = localStorage.getItem("access_token");
    let isEditMode = false;

    if (!token) {
        alert("يرجى تسجيل الدخول أولاً");
        window.location.href = "/static/test_chat.html";
    }

    // 1. عرض المستخدمين (Read)
    async function loadUsers() {
        try {
            const response = await fetch(`http://${API_BASE_URL}/api/v1/users/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const users = await response.json();
            const tbody = document.getElementById("usersTableBody");
            tbody.innerHTML = "";

            users.forEach(user => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.full_name || 'غير محدد'}</td>
                    <td>${user.email}</td>
                    <td>
                        <button class="btn-edit" onclick="openEditModal(${user.id}, '${user.full_name || ''}', '${user.email}')">تعديل</button>
                        <button class="btn-delete" onclick="deleteUser(${user.id})">حذف</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error("فشل في تحميل المستخدمين:", error);
        }
    }

    // 2. فتح نافذة الإضافة
    function openAddModal() {
        isEditMode = false;
        document.getElementById("modalTitle").innerText = "إضافة مستخدم جديد";
        document.getElementById("currentUserId").value = "";
        document.getElementById("fullNameInput").value = "";
        document.getElementById("emailInput").value = "";
        document.getElementById("passwordInput").value = "";
        document.getElementById("passLabel").innerText = "كلمة المرور:";
        document.getElementById("userModal").style.display = "flex";
    }

    // 3. فتح نافذة التعديل
    function openEditModal(id, name, email) {
        isEditMode = true;
        document.getElementById("modalTitle").innerText = "تعديل بيانات المستخدم";
        document.getElementById("currentUserId").value = id;
        document.getElementById("fullNameInput").value = name;
        document.getElementById("emailInput").value = email;
        document.getElementById("passwordInput").value = "";
        document.getElementById("passLabel").innerText = "تحديث كلمة المرور:";
        document.getElementById("userModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("userModal").style.display = "none";
    }

    // 4. حفظ البيانات (إضافة أو تعديل - Create / Update)
    async function saveUser() {
        const id = document.getElementById("currentUserId").value;
        const fullName = document.getElementById("fullNameInput").value;
        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;

        if(!fullName || !email || !password) {
            alert("يرجى ملء جميع الحقول");
            return;
        }

        const payload = { full_name: fullName, email: email, password: password };
        
        let url = `http://${API_BASE_URL}/api/v1/users/`;
        let method = "POST";

        if (isEditMode) {
            url += id;
            method = "PUT";
        }

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert(isEditMode ? "تم التعديل بنجاح" : "تمت الإضافة بنجاح");
                closeModal();
                loadUsers();
            } else {
                alert("فشل في حفظ البيانات");
            }
        } catch (error) {
            console.error(error);
        }
    }

    // 5. حذف مستخدم (Delete)
    async function deleteUser(id) {
        if (!confirm("هل أنت متأكد من رغبتك في حذف هذا المستخدم نهائياً؟")) return;

        try {
            const response = await fetch(`http://${API_BASE_URL}/api/v1/users/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                alert("تم حذف المستخدم بنجاح");
                loadUsers();
            } else {
                alert("فشل في حذف المستخدم");
            }
        } catch (error) {
            console.error(error);
        }
    }

    // تحميل البيانات عند فتح الصفحة
    loadUsers();
</script>

</body>
</html>
